<svg viewBox="0 0 200 240" xmlns="http://www.w3.org/2000/svg">
  <!-- Circle background -->
  <circle cx="100" cy="80" r="70" fill="#E8F5E9"/>
  
  <!-- Building shapes -->
  <!-- Left building -->
  <rect x="45" y="55" width="20" height="50" fill="#4CAF50" rx="2"/>
  <circle cx="55" cy="50" r="4" fill="#FFC107"/>
  <rect x="50" y="65" width="8" height="8" fill="#ffffff" opacity="0.4"/>
  <rect x="50" y="78" width="8" height="8" fill="#ffffff" opacity="0.4"/>
  <rect x="50" y="91" width="8" height="8" fill="#ffffff" opacity="0.4"/>
  
  <!-- Center tall building (hexagon style) -->
  <path d="M 100 30 L 125 50 L 125 110 L 100 130 L 75 110 L 75 50 Z" fill="#2E7D32"/>
  <circle cx="100" cy="35" r="5" fill="#FFC107"/>
  <rect x="90" y="55" width="10" height="10" fill="#ffffff" opacity="0.4"/>
  <rect x="90" y="72" width="10" height="10" fill="#ffffff" opacity="0.4"/>
  <rect x="90" y="89" width="10" height="10" fill="#ffffff" opacity="0.4"/>
  
  <!-- Right building -->
  <rect x="135" y="60" width="20" height="45" fill="#4CAF50" rx="2"/>
  <circle cx="145" cy="55" r="4" fill="#FFC107"/>
  <rect x="140" y="70" width="8" height="8" fill="#ffffff" opacity="0.4"/>
  <rect x="140" y="83" width="8" height="8" fill="#ffffff" opacity="0.4"/>
  <rect x="140" y="96" width="8" height="8" fill="#ffffff" opacity="0.4"/>
  
  <!-- Base line -->
  <rect x="40" y="110" width="120" height="4" fill="#2E7D32"/>
  
  <!-- Accent dots -->
  <circle cx="70" cy="30" r="3" fill="#4CAF50"/>
  <circle cx="130" cy="25" r="3" fill="#4CAF50"/>
  
  <!-- Text: COVAI PROPERTIES -->
  <text x="100" y="160" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#2E7D32">COVAI</text>
  <text x="100" y="185" font-family="Arial, sans-serif" font-size="16" text-anchor="middle" fill="#546E7A" letter-spacing="3">PROPERTIES</text>
  
  <!-- Decorative line -->
  <line x1="60" y1="195" x2="75" y2="195" stroke="#4CAF50" stroke-width="3"/>
  <line x1="85" y1="195" x2="115" y2="195" stroke="#66BB6A" stroke-width="3"/>
  <line x1="125" y1="195" x2="140" y2="195" stroke="#4CAF50" stroke-width="3"/>
  
  <!-- Tagline -->
  <text x="100" y="220" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#90A4AE" letter-spacing="2">BUILDING DREAMS</text>
</svg>